databases:
  - name: Test
    databaseName: test_bb89
    user: test_bb89_user
    plan: basic

services:
  - type: web
    name: luxangelsyamyam-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node app.js
    autoDeploy: true
    healthCheckPath: /api/health/db
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: Test
          property: connectionString
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://luxangelsyamyamyam.onrender.com
      - key: PGSSLMODE
        value: "true"

  - type: web
    name: Luxangelsyamyamyam
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://luxangelsyamyam-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
